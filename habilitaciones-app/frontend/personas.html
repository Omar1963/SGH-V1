<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGH-V1 | Personas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; }
        .sidebar { width: 280px; height: 100vh; position: fixed; background: #111827; color: #fff; }
        .main-content { margin-left: 280px; padding: 2rem; }
        .nav-link { color: rgba(255,255,255,.76); border-radius: 8px; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,.12); }
        .role-badge { font-size: .75rem; }
    </style>
</head>
<body>
    <nav class="sidebar p-3 d-flex flex-column">
        <h3 class="fw-bold text-center mb-1 text-info">SGH-V1</h3>
        <div class="text-center mb-3">
            <span id="roleBadge" class="badge text-bg-light role-badge">Sin Rol</span>
        </div>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li data-roles="ADMIN_CONSULTORA,RESPONSABLE_HABILITACIONES,OPERADOR_CONSULTORA,EMPRESA,AUDITOR">
                <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line me-2"></i>Dashboard</a>
            </li>
            <li data-roles="ADMIN_CONSULTORA,RESPONSABLE_HABILITACIONES">
                <a href="empresas.html" class="nav-link"><i class="fas fa-building me-2"></i>Empresas</a>
            </li>
            <li data-roles="ADMIN_CONSULTORA,RESPONSABLE_HABILITACIONES,OPERADOR_CONSULTORA,EMPRESA,AUDITOR">
                <a href="personas.html" class="nav-link active"><i class="fas fa-users me-2"></i>Personas</a>
            </li>
            <li data-roles="ADMIN_CONSULTORA,RESPONSABLE_HABILITACIONES,OPERADOR_CONSULTORA,EMPRESA">
                <a href="documentos.html" class="nav-link"><i class="fas fa-file-alt me-2"></i>Documentación</a>
            </li>
        </ul>
        <hr>
        <div class="small text-light-emphasis mb-2" id="userNameDisplay">Usuario</div>
        <button class="btn btn-outline-light btn-sm w-100" id="logoutBtn">Cerrar sesión</button>
    </nav>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1">Gestión de Personas</h1>
                <p class="text-muted mb-0">Alta y seguimiento de personal operativo y administrativo.</p>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#personaModal">
                <i class="fas fa-user-plus me-2"></i>Nuevo
            </button>
        </header>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>DNI</th>
                            <th>CUIL</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="personasTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal fade" id="personaModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrar persona</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="personaForm">
                    <div class="modal-body">
                        <div class="row g-2 mb-2">
                            <div class="col">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Apellido</label>
                                <input type="text" id="apellido" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">DNI</label>
                            <input type="text" id="dni" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">CUIL</label>
                            <input type="text" id="cuil" class="form-control">
                        </div>
                        <div class="mb-1">
                            <label class="form-label">Empresa ID</label>
                            <input type="number" id="empresa_id" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import auth from './js/auth.js';
        import personas from './js/personas.js';
        if (!auth.isAuthenticated()) window.location.href = '/login.html';
        auth.applyUIPermissions();
        document.getElementById('logoutBtn').addEventListener('click', () => auth.logout());
    </script>
</body>
</html>
