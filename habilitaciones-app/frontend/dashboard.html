<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGH-V1 | Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .sidebar { width: 280px; height: 100vh; position: fixed; background: #2c3e50; color: #fff; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 2rem; }
        .nav-link { color: rgba(255,255,255,0.7); }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); }
        .stat-card { border: none; border-radius: 1rem; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <!-- Barra Lateral -->
    <nav class="sidebar p-3 d-flex flex-column">
        <h3 class="fw-bold text-center mb-4 text-primary">SGH-V1</h3>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="#" class="nav-link active"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
            </li>
            <li>
                <a href="#" class="nav-link"><i class="fas fa-building me-2"></i> Empresas</a>
            </li>
            <li>
                <a href="#" class="nav-link"><i class="fas fa-users me-2"></i> Personas</a>
            </li>
            <li>
                <a href="#" class="nav-link"><i class="fas fa-file-alt me-2"></i> Documentación</a>
            </li>
        </ul>
        <hr>
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
                <i class="fas fa-user-circle fa-2x me-2"></i>
                <strong id="userNameDisplay">Usuario</strong>
            </a>
            <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
                <li><a class="dropdown-item" href="#" id="logoutBtn">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2">Panel de Control</h1>
            <div id="currentDate" class="text-muted small"></div>
        </header>

        <div class="row g-4" id="statsContainer">
            <!-- Tarjetas de Estadísticas se cargan aquí -->
            <div class="col-md-4">
                <div class="card stat-card bg-success text-white p-3">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase opacity-75">Vigentes</h6>
                        <h2 class="display-5 fw-bold" id="statVigentes">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card bg-warning text-dark p-3">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase opacity-75">Por Vencer</h6>
                        <h2 class="display-5 fw-bold" id="statPorVencer">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card bg-danger text-white p-3">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase opacity-75">Vencidos</h6>
                        <h2 class="display-5 fw-bold" id="statVencidos">-</h2>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import api from './js/api.js';
        import auth from './js/auth.js';

        // Seguridad: Redirigir si no hay token
        if (!auth.isAuthenticated()) {
            window.location.href = '/login.html';
        }

        // Aplicar permisos de UI según Rol
        auth.applyUIPermissions();

        async function loadDashboardData() {
            try {
                const summary = await api.get('/dashboard/summary');
                
                document.getElementById('statVigentes').textContent = summary.habilitaciones_vigentes;
                document.getElementById('statPorVencer').textContent = summary.habilitaciones_por_vencer;
                document.getElementById('statVencidos').textContent = summary.habilitaciones_vencidas;
                
            } catch (error) {
                console.error('Error cargando dashboard:', error);
            }
        }

        // Inicialización
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-ES', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            auth.logout();
        });

        loadDashboardData();
    </script>
</body>
</html>
