<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGH-V1 | Empresas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .sidebar { width: 280px; height: 100vh; position: fixed; background: #2c3e50; color: #fff; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 2rem; }
        .nav-link { color: rgba(255,255,255,0.7); }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <!-- Sidebar (Copia del diseño del dashboard para consistencia) -->
    <nav class="sidebar p-3 d-flex flex-column">
        <h3 class="fw-bold text-center mb-4 text-primary">SGH-V1</h3>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
            </li>
            <li>
                <a href="empresas.html" class="nav-link active"><i class="fas fa-building me-2"></i> Empresas</a>
            </li>
            <li>
                <a href="personas.html" class="nav-link"><i class="fas fa-users me-2"></i> Personas</a>
            </li>
            <li>
                <a href="#" class="nav-link"><i class="fas fa-file-alt me-2"></i> Documentación</a>
            </li>
        </ul>
        <hr>
        <button class="btn btn-outline-light btn-sm w-100" id="logoutBtn">Cerrar Sesión</button>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h2">Gestión de Empresas</h1>
                <p class="text-muted">Administración de clientes y entidades registradas.</p>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#empresaModal">
                <i class="fas fa-plus me-2"></i> Nueva Empresa
            </button>
        </header>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 50px;">ID</th>
                            <th>Razón Social</th>
                            <th>CUIT</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="empresasTableBody">
                        <!-- Se carga via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal de Creación -->
    <div class="modal fade" id="empresaModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrar Nueva Empresa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="empresaForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Razón Social</label>
                            <input type="text" id="razon_social" class="form-control" required placeholder="Nombre legal">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">CUIT</label>
                            <input type="text" id="cuit" class="form-control" required placeholder="XX-XXXXXXXX-X">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <input type="text" id="direccion" class="form-control" placeholder="Dirección legal">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Guardar Empresa</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import auth from './js/auth.js';
        import empresas from './js/empresas.js';

        if (!auth.isAuthenticated()) window.location.href = '/login.html';
        
        auth.applyUIPermissions();
        
        document.getElementById('logoutBtn').addEventListener('click', () => auth.logout());
    </script>
</body>
</html>
