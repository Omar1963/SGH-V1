<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGH-V1 | Documentación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .sidebar { width: 280px; height: 100vh; position: fixed; background: #2c3e50; color: #fff; z-index: 1000; }
        .main-content { margin-left: 280px; padding: 2rem; }
        .nav-link { color: rgba(255,255,255,0.7); }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar p-3 d-flex flex-column">
        <h3 class="fw-bold text-center mb-4 text-primary">SGH-V1</h3>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
            </li>
            <li>
                <a href="empresas.html" class="nav-link"><i class="fas fa-building me-2"></i> Empresas</a>
            </li>
            <li>
                <a href="personas.html" class="nav-link"><i class="fas fa-users me-2"></i> Personas</a>
            </li>
            <li>
                <a href="documentos.html" class="nav-link active"><i class="fas fa-file-alt me-2"></i> Documentación</a>
            </li>
        </ul>
        <hr>
        <button class="btn btn-outline-light btn-sm w-100" id="logoutBtn">Cerrar Sesión</button>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h2">Repositorio Documental</h1>
                <p class="text-muted">Control y seguimiento de legajos y credenciales.</p>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">
                <i class="fas fa-upload me-2"></i> Subir Documento
            </button>
        </header>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-0 py-3">
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary active">Todos</button>
                    <button class="btn btn-sm btn-outline-primary">Pendientes Revisión</button>
                    <button class="btn btn-sm btn-outline-success">Aprobados</button>
                </div>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 50px;">ID</th>
                            <th>Tipo de Documento</th>
                            <th>Vínculo</th>
                            <th>Estado</th>
                            <th>Vencimiento</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="documentosTableBody">
                        <!-- Se carga via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal de Subida -->
    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Subir Nuevo Archivo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="uploadForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Archivo (PDF / Imagen)</label>
                            <input type="file" id="fileInput" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo de Documento</label>
                            <select id="tipo_documento" class="form-select" required>
                                <option value="DNI">DNI (Frente/Dorso)</option>
                                <option value="CURSO_SEGURIDAD">Curso de Seguridad</option>
                                <option value="HABILITACION_ANMAC">Habilitación ANMaC</option>
                                <option value="OTRO">Otro Documento</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha de Vencimiento</label>
                            <input type="date" id="vencimiento_input" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">ID de Persona (Opcional)</label>
                            <input type="number" id="persona_id_link" class="form-control" placeholder="ID del personal vinculado">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Cargar Documento</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import auth from './js/auth.js';
        import documentos from './js/documentos.js';

        if (!auth.isAuthenticated()) window.location.href = '/login.html';
        
        auth.applyUIPermissions();
        
        document.getElementById('logoutBtn').addEventListener('click', () => auth.logout());
    </script>
</body>
</html>
